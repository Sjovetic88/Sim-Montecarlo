name = "montecarlo"
main = "src/montecarlo.js"
compatibility_date = "2024-03-01"

# Associazione con il Database di Archivio (Lettura Regole, Match e Rating)
[[d1_databases]]
binding = "DB_ARCHIVIO"
database_name = "DB_ARCHIVIO"
database_id = "dd9a583d-ee1c-4114-891a-bd44b17ec1e7"

# Associazione con il Database dei Pronostici (Lettura Rho e Scrittura Proiezioni)
[[d1_databases]]
binding = "DB_PRONOSTICI"
database_name = "DB_PRONOSTICI"
database_id = "6f393ca6-0ebc-4f37-98db-3df8857222ed"

# Schedulatore orario (Cron Trigger)
# Avvia l'aggiornamento automatico a rotazione di una lega ogni 2 ore
[triggers]
crons = ["0 */2 * * *"] 
